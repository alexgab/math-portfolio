<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотр работы</title>
  <meta name="description" content="Просмотр материалов портфолио учителя математики.">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div class="viewer-shell">
    <header class="viewer-header">
      <a class="back-link" href="index.html">Вернуться на главную</a>
      <div class="viewer-intro">
        <p class="viewer-kicker" id="work-category">Материал</p>
        <h1 id="work-title">Загрузка материала...</h1>
        <p class="viewer-summary" id="work-summary"></p>
      </div>
      <div class="viewer-actions">
        <a class="button button-primary" id="download-link" href="#">Скачать DOCX</a>
        <a class="button button-secondary" href="index.html#works">Ко всем работам</a>
      </div>
    </header>

    <main class="viewer-layout">
      <section class="content-card">
        <div class="content-card-head">
          <h2>Текст материала</h2>
          <p>Содержимое отображается в формате для чтения на сайте.</p>
        </div>
        <pre class="document-text" id="document-text">Материал загружается...</pre>
      </section>

      <aside class="side-card" id="preview-card" hidden>
        <h2>Иллюстрация</h2>
        <img id="preview-image" alt="">
      </aside>
    </main>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
